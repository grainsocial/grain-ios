disabled_rules:
  # Formatting — owned by SwiftFormat, not SwiftLint
  - line_length
  - trailing_comma
  - trailing_whitespace
  - vertical_whitespace
  - opening_brace
  - closing_brace
  - closure_end_indentation
  - closure_spacing
  - closure_parameter_position
  - colon
  - comma
  - comma_inheritance
  - function_name_whitespace
  - return_arrow_whitespace
  - statement_position
  - trailing_newline
  - trailing_semicolon
  - leading_whitespace
  - control_statement
  - empty_parentheses_with_trailing_closure
  - comment_spacing
  - attribute_name_spacing
  - attributes
  - collection_alignment
  - computed_accessors_order
  - empty_enum_arguments
  - empty_parameters
  - implicit_return
  - multiline_arguments
  - multiline_parameters
  - switch_case_alignment
  - void_return
  - multiple_closures_with_trailing_closure
  # Conflicts with @ViewBuilder — let _ = is required there
  - redundant_discardable_let
  # Not useful at this scale
  - nesting
  - large_tuple
  - file_length
  - function_parameter_count

# SwiftUI views naturally have long bodies
function_body_length:
  warning: 100
  error: 250

type_body_length:
  warning: 400
  error: 600

cyclomatic_complexity:
  warning: 15
  error: 25
  ignores_case_statements: true

identifier_name:
  min_length: 2
  excluded:
    - id
    - x
    - y
    - z
    - i
    - j
    - k
    - v
