name: Grain
options:
  bundleIdPrefix: social.grain
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: YN68LN9T7Z

packages:
  Nuke:
    url: https://github.com/kean/Nuke
    from: "12.0.0"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: "4.2.2"
  SwiftyH3:
    url: https://github.com/pawelmajcher/SwiftyH3
    from: "0.5.0"

targets:
  Grain:
    type: application
    platform: iOS
    sources:
      - path: Grain
    entitlements:
      path: Grain/Grain.entitlements
      properties:
        com.apple.developer.associated-domains:
          - applinks:grain.social
          - webcredentials:grain.social
    settings:
      base:
        INFOPLIST_FILE: Grain/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: social.grain.grain
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "35"
    dependencies:
      - package: Nuke
        product: Nuke
      - package: Nuke
        product: NukeUI
      - package: KeychainAccess
      - package: SwiftyH3
    info:
      path: Grain/Info.plist
      properties:
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - grain
        CFBundleIconName: AppIcon
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: Grain needs camera access to take photos for your stories and galleries.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UIAppFonts:
          - Syne-Variable.ttf
        UILaunchScreen: {}

  GrainTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GrainTests
    dependencies:
      - target: Grain
